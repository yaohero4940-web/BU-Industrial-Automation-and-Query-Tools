function t(key) {
    return UI_TEXT[pageLang][key];
}

function categoryLabel(category) {
    if (category === 'all') return t('all');
    return CATEGORY_LABELS[category]?.[pageLang] || category;
}

function categoryIcon(category, label) {
    if (category === 'all') return pageLang === 'en' ? 'ALL' : '全';
    if (pageLang === 'en') {
        return label.split(/\s+/).map(word => word[0]).join('').slice(0, 2).toUpperCase();
    }
    return label.slice(0, 1);
}

function sectionLabelText(label) {
    return SECTION_LABELS[label]?.[pageLang] || label;
}

function getCategories() {
    const counts = new Map();
    DB.forEach(entry => counts.set(entry.category, (counts.get(entry.category) || 0) + 1));
    return Array.from(counts, ([name, count], index) => ({ name, count, color: categoryPalette[index % categoryPalette.length] }));
}

function getCategoryColor(category) {
    return categoryTone.get(category) || categoryPalette[0];
}

function renderCategories() {
    const categories = getCategories();
    categoryTone.clear();
    categories.forEach(cat => categoryTone.set(cat.name, cat.color));

    totalCount.textContent = t('total')(DB.length);
    categoryTotal.textContent = t('categories')(categories.length);

    const items = [{ name: 'all', label: categoryLabel('all'), count: DB.length, color: '#001965' }]
        .concat(categories.map(cat => ({ name: cat.name, label: categoryLabel(cat.name), count: cat.count, color: cat.color })));

    sidebar.setAttribute('aria-label', t('sidebar'));
    sidebar.innerHTML = `<div class="sidebar-title">${escapeHtml(t('sidebar'))}</div>` + items.map((item) => `
        <button class="category-item${item.name === currentCategory ? ' active' : ''}" type="button" data-category="${escapeHtml(item.name)}" onclick="filterCategory('${escapeJs(item.name)}', this)">
            <span class="category-icon" style="background:${item.color}">${escapeHtml(categoryIcon(item.name, item.label))}</span>
            <span class="category-name">${escapeHtml(item.label)}</span>
            <span class="category-count">${item.count}</span>
        </button>
    `).join('');
}

function fuzzyMatch(str, query) {
    const s = String(str).toLowerCase();
    const words = query.toLowerCase().trim().split(/\s+/).filter(Boolean);
    return words.every(word => s.includes(word));
}

function highlightText(text, query) {
    if (!query || !query.trim()) return escapeHtml(text);
    const words = query.toLowerCase().trim().split(/\s+/).filter(Boolean);
    let result = escapeHtml(text);
    for (const word of words) {
        const regex = new RegExp('(' + escapeRegex(word) + ')', 'gi');
        result = result.replace(regex, '<mark>$1</mark>');
    }
    return result;
}

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = String(text);
    return div.innerHTML;
}

function escapeRegex(str) {
    return str.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

function escapeJs(text) {
    return String(text).replace(/\\/g, '\\\\').replace(/'/g, "\\'");
}

function updateResults() {
    const query = searchInput.value.trim();
    searchQuery = query;
    clearBtn.style.display = query ? 'flex' : 'none';

    let results = DB;
    if (currentCategory !== 'all') {
        results = results.filter(entry => entry.category === currentCategory);
    }

    if (query) {
        results = results.filter(entry =>
            fuzzyMatch(entry.name, query) ||
            fuzzyMatch(entry.content, query) ||
            fuzzyMatch(entry.category, query)
        );
    }

    currentResults = results;
    renderResults();
}

function renderResults() {
    if (currentResults.length === 0) {
        resultsGrid.innerHTML = '';
        noResults.style.display = 'block';
        resultsCount.innerHTML = t('zero');
        return;
    }

    noResults.style.display = 'none';
    const categoryText = categoryLabel(currentCategory);
    resultsCount.innerHTML = t('found')(currentResults.length, categoryText, searchQuery);

    resultsGrid.innerHTML = currentResults.map((entry, idx) => {
        const preview = entry.content.replace(/\s+/g, ' ').trim().substring(0, 145);
        const color = getCategoryColor(entry.category);
        return `<article class="result-card" tabindex="0" role="button" aria-label="${escapeHtml(t('viewAria')(entry.name))}" onclick="showDetail(${idx})" onkeydown="handleCardKey(event, ${idx})" style="--category-color:${color}; animation-delay:${Math.min(idx * 0.018, 0.28)}s">
            <div class="result-card-header">
                <div class="result-card-title">${highlightText(entry.name, searchQuery)}</div>
                <span class="result-card-badge">${escapeHtml(categoryLabel(entry.category))}</span>
            </div>
            <div class="result-card-preview">${highlightText(preview, searchQuery)}</div>
        </article>`;
    }).join('');
}

function handleCardKey(event, idx) {
    if (event.key === 'Enter' || event.key === ' ') {
        event.preventDefault();
        showDetail(idx);
    }
}

function showDetail(idx) {
    currentDetailIdx = idx;
    const entry = currentResults[idx];
    if (!entry) return;

    detailTitle.textContent = entry.name;
    detailCategory.textContent = categoryLabel(entry.category);
    detailIndex.textContent = `${idx + 1} / ${currentResults.length}`;

    const lines = entry.content.split('\n');
    let html = '';
    const sectionLabels = ['语法', '用途', '例子', '注释', '释义', '参考', '范围', '范例', '说明', '格式'];

    lines.forEach(line => {
        const trimmed = line.trim();
        if (!trimmed) {
            html += '<div class="content-line empty"></div>';
            return;
        }

        const label = sectionLabels.find(item => trimmed === item || trimmed.startsWith(item + '\t') || trimmed.startsWith(item + ' '));
        if (label) {
            const parts = line.split(/\t/);
            html += `<div class="section-label">${escapeHtml(sectionLabelText(parts[0].trim()))}</div>`;
            if (parts.length > 1) {
                html += `<div class="content-line syntax-line">${escapeHtml(parts.slice(1).join('  '))}</div>`;
            }
            return;
        }

        if (/^\d{2,5}\s/.test(trimmed) || /^[A-Z][A-Z0-9_]*\s*[=(]/.test(trimmed)) {
            html += `<div class="content-line example-line">${escapeHtml(line)}</div>`;
        } else if (line.includes('\t')) {
            html += `<div class="content-line syntax-line">${escapeHtml(line.replace(/\t/g, '  '))}</div>`;
        } else {
            html += `<div class="content-line">${escapeHtml(line)}</div>`;
        }
    });

    detailContent.innerHTML = html;
    prevBtn.className = 'detail-nav-btn' + (idx <= 0 ? ' disabled' : '');
    nextBtn.className = 'detail-nav-btn' + (idx >= currentResults.length - 1 ? ' disabled' : '');

    resultsView.style.display = 'none';
    detailView.classList.add('active');
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

function goBack() {
    detailView.classList.remove('active');
    resultsView.style.display = 'block';
    requestAnimationFrame(() => {
        const firstCard = resultsGrid.querySelector('.result-card');
        if (firstCard) firstCard.focus({ preventScroll: true });
    });
}

function navPrev() {
    if (currentDetailIdx > 0) showDetail(currentDetailIdx - 1);
}

function navNext() {
    if (currentDetailIdx < currentResults.length - 1) showDetail(currentDetailIdx + 1);
}

function filterCategory(cat, el) {
    currentCategory = cat;
    document.querySelectorAll('.category-item').forEach(item => item.classList.remove('active'));
    el.classList.add('active');
    detailView.classList.remove('active');
    resultsView.style.display = 'block';
    updateResults();
}

function clearSearchInput() {
    searchInput.value = '';
    searchInput.focus();
    updateResults();
}

function applyStaticLanguage(options = {}) {
    const rerender = options.rerender !== false;
    document.documentElement.lang = pageLang === 'en' ? 'en' : 'zh-CN';
    document.title = pageLang === 'en' ? 'PPCL Command Reference' : 'PPCL 命令查询工具';
    brandTitle.textContent = t('title');
    brandSubtitle.textContent = t('subtitle');
    searchInput.placeholder = t('search');
    clearBtn.setAttribute('aria-label', t('clear'));
    viewHint.textContent = t('hint');
    noResultsTitle.textContent = t('noTitle');
    noResultsText.textContent = t('noText');
    backBtn.textContent = t('back');
    prevBtn.textContent = t('prev');
    nextBtn.textContent = t('next');
    footerNote.textContent = t('footer');
    pageLangToggle.textContent = t('langButton');

    if (rerender) {
        renderCategories();
        if (detailView.classList.contains('active') && currentDetailIdx > -1) {
            showDetail(currentDetailIdx);
        } else {
            updateResults();
        }
    }
}

pageLangToggle.addEventListener('click', () => {
    pageLang = pageLang === 'en' ? 'zh' : 'en';
    applyStaticLanguage();
});

searchInput.addEventListener('input', updateResults);

document.addEventListener('keydown', function(e) {
    if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'k') {
        e.preventDefault();
        searchInput.focus();
        searchInput.select();
    }

    if (e.key === 'Escape') {
        if (detailView.classList.contains('active')) {
            goBack();
        } else if (searchInput.value) {
            clearSearchInput();
        }
    }

    if (detailView.classList.contains('active')) {
        if (e.key === 'ArrowLeft') navPrev();
        if (e.key === 'ArrowRight') navNext();
    }
});

applyStaticLanguage({ rerender: false });
renderCategories();
updateResults();
searchInput.focus();
</script>
<script id="premium-ppcl-interactions">
(function () {
    const root = document.documentElement;
    const body = document.body;
    const searchInput = document.getElementById('searchInput');
    const detailView = document.getElementById('detailView');

    function updatePointer(event) {
        root.style.setProperty('--spot-x', event.clientX + 'px');
        root.style.setProperty('--spot-y', event.clientY + 'px');
        root.style.setProperty('--shine-x', ((event.clientX / Math.max(window.innerWidth, 1)) * 130 - 50).toFixed(2) + '%');
    }

    function updateProgress() {
        const max = Math.max(document.documentElement.scrollHeight - window.innerHeight, 1);
        root.style.setProperty('--read-progress', Math.min(100, Math.max(0, window.scrollY / max * 100)).toFixed(2) + '%');
    }

    function enhanceCards() {
        document.querySelectorAll('.result-card').forEach(card => {
            if (card.dataset.premiumReady) return;
            card.dataset.premiumReady = 'true';
            card.addEventListener('pointermove', event => {
                const rect = card.getBoundingClientRect();
                const x = event.clientX - rect.left;
                const y = event.clientY - rect.top;
                const px = x / rect.width;
                const py = y / rect.height;
                card.style.setProperty('--mx', (px * 100).toFixed(2) + '%');
                card.style.setProperty('--my', (py * 100).toFixed(2) + '%');
                card.style.setProperty('--rx', ((0.5 - py) * 7).toFixed(2) + 'deg');
                card.style.setProperty('--ry', ((px - 0.5) * 9).toFixed(2) + 'deg');
                card.classList.add('is-tilting');
            });
            card.addEventListener('pointerleave', () => {
                card.classList.remove('is-tilting');
                card.style.removeProperty('--rx');
                card.style.removeProperty('--ry');
            });
        });
    }

    const observer = new MutationObserver(enhanceCards);
    observer.observe(document.getElementById('resultsGrid'), { childList: true });

    const progress = document.createElement('div');
    progress.className = 'premium-progress';
    body.appendChild(progress);

    const floatbar = document.createElement('div');
    floatbar.className = 'premium-floatbar';
    floatbar.innerHTML = '<button class="premium-action" type="button" data-action="palette" title="Command palette Ctrl/⌘ + K">⌘K</button><button class="premium-action" type="button" data-action="top" title="Back to top">↑</button>';
    body.appendChild(floatbar);

    const command = document.createElement('div');
    command.className = 'premium-command';
    command.innerHTML = '<div class="premium-panel" role="dialog" aria-label="Command palette"><div class="premium-command-head"><span>⌘K</span><input id="premiumCommandInput" type="text" placeholder="Quick jump command, e.g. GOTO, ALARM, .EQ." autocomplete="off"><button class="premium-action" type="button" data-action="close">×</button></div><div class="premium-command-list" id="premiumCommandList"></div></div>';
    body.appendChild(command);

    const commandInput = document.getElementById('premiumCommandInput');
    const commandList = document.getElementById('premiumCommandList');
    const paletteButton = floatbar.querySelector('[data-action="palette"]');
    const topButton = floatbar.querySelector('[data-action="top"]');
    const commandPanel = command.querySelector('.premium-panel');
    let commandResults = [];
    let commandActive = 0;

    function premiumText(en, zh) {
        return pageLang === 'en' ? en : zh;
    }

    function applyPremiumLanguage() {
        paletteButton.title = premiumText('Command palette Ctrl/⌘ + K', '命令面板 Ctrl/⌘ + K');
        topButton.title = premiumText('Back to top', '回到顶部');
        commandPanel.setAttribute('aria-label', premiumText('Command palette', '命令面板'));
        commandInput.placeholder = premiumText('Quick jump command, e.g. GOTO, ALARM, .EQ.', '快速跳转命令，例如 GOTO、ALARM、.EQ.');
    }

    function commandFilter(value) {
        const query = value.trim().toLowerCase();
        const words = query.split(/\s+/).filter(Boolean);
        commandResults = DB.filter(item => {
            const hay = (item.name + ' ' + item.category + ' ' + item.content).toLowerCase();
            return words.every(word => hay.includes(word));
        }).slice(0, 10);
        commandActive = 0;
        renderCommandList();
    }

    function renderCommandList() {
        if (!commandResults.length) {
            commandList.innerHTML = '<div class="premium-command-item"><strong>' + premiumText('No matches', '没有匹配结果') + '</strong><span>' + premiumText('Try another keyword', '换个关键词试试') + '</span></div>';
            return;
        }
        commandList.innerHTML = commandResults.map((item, index) => {
            return '<button class="premium-command-item' + (index === commandActive ? ' active' : '') + '" type="button" data-index="' + index + '"><strong>' + escapeHtml(item.name) + '</strong><span>' + escapeHtml(categoryLabel(item.category)) + '</span></button>';
        }).join('');
    }

    function openCommand() {
        command.classList.add('active');
        commandInput.value = searchInput ? searchInput.value : '';
        commandFilter(commandInput.value);
        requestAnimationFrame(() => commandInput.focus());
    }

    function closeCommand() {
        command.classList.remove('active');
    }

    function jumpToCommand(index) {
        const entry = commandResults[index];
        if (!entry) return;
        closeCommand();
        if (searchInput) {
            searchInput.value = entry.name.split('（')[0].trim();
            updateResults();
            const foundIndex = currentResults.findIndex(item => item.id === entry.id);
            showDetail(foundIndex >= 0 ? foundIndex : 0);
        }
    }

    commandInput.addEventListener('input', () => commandFilter(commandInput.value));
    commandInput.addEventListener('keydown', event => {
        if (event.key === 'ArrowDown') {
            event.preventDefault();
            commandActive = Math.min(commandResults.length - 1, commandActive + 1);
            renderCommandList();
        } else if (event.key === 'ArrowUp') {
            event.preventDefault();
            commandActive = Math.max(0, commandActive - 1);
            renderCommandList();
        } else if (event.key === 'Enter') {
            event.preventDefault();
            jumpToCommand(commandActive);
        } else if (event.key === 'Escape') {
            closeCommand();
        }
    });

    commandList.addEventListener('click', event => {
        const button = event.target.closest('.premium-command-item[data-index]');
        if (button) jumpToCommand(Number(button.dataset.index));
    });

    command.addEventListener('click', event => {
        if (event.target === command || event.target.dataset.action === 'close') closeCommand();
    });

    pageLangToggle.addEventListener('click', () => {
        applyPremiumLanguage();
        renderCommandList();
    });

    floatbar.addEventListener('click', event => {
        const action = event.target.dataset.action;
        if (action === 'palette') openCommand();
        if (action === 'top') window.scrollTo({ top: 0, behavior: 'smooth' });
    });

    document.addEventListener('mousemove', updatePointer, { passive: true });
    document.addEventListener('scroll', updateProgress, { passive: true });
    document.addEventListener('keydown', event => {
        if ((event.ctrlKey || event.metaKey) && event.key.toLowerCase() === 'k') {
            event.preventDefault();
            openCommand();
        }
    });

    const originalRenderResults = window.renderResults || renderResults;
    window.renderResults = function () {
        originalRenderResults();
        enhanceCards();
    };

    const originalShowDetail = window.showDetail || showDetail;
    window.showDetail = function (idx) {
        originalShowDetail(idx);
        if (detailView) detailView.animate([{ opacity: 0, transform: 'translateY(18px)' }, { opacity: 1, transform: 'translateY(0)' }], { duration: 380, easing: 'cubic-bezier(.2,.8,.2,1)' });
    };

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = String(text);
        return div.innerHTML;
    }

    applyPremiumLanguage();
    enhanceCards();
    updateProgress();
})();
</script>
